version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: satellite-db
    environment:
      POSTGRES_USER: satellite
      POSTGRES_PASSWORD: satellite_dev
      POSTGRES_DB: satellite_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satellite -d satellite_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: satellite-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: satellite-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://satellite:satellite_dev@db:5432/satellite_data
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      GEE_PROJECT_ID: ${GEE_PROJECT_ID:-}
      GEE_SERVICE_ACCOUNT_KEY: /credentials/gee-service-account.json
      SENTINELHUB_CLIENT_ID: ${SENTINELHUB_CLIENT_ID:-}
      SENTINELHUB_CLIENT_SECRET: ${SENTINELHUB_CLIENT_SECRET:-}
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
      - ./data:/data
      - ./credentials:/credentials:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: satellite-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://satellite:satellite_dev@db:5432/satellite_data
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      GEE_PROJECT_ID: ${GEE_PROJECT_ID:-}
      GEE_SERVICE_ACCOUNT_KEY: /credentials/gee-service-account.json
      SENTINELHUB_CLIENT_ID: ${SENTINELHUB_CLIENT_ID:-}
      SENTINELHUB_CLIENT_SECRET: ${SENTINELHUB_CLIENT_SECRET:-}
    volumes:
      - ./backend:/app
      - ./workers:/app/workers
      - ./data:/data
      - ./credentials:/credentials:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: satellite-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
