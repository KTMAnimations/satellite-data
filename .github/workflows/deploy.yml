name: Deploy to geotiles.tech VM

# Push to main → build the frontend here, ship it + restart the backend on the
# Oracle VM over SSH. Lets you deploy from the repo without the server owner.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_WEB_ROOT: ${{ secrets.DEPLOY_WEB_ROOT }}
    steps:
      - name: Check deploy is configured
        id: gate
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "Deploy secrets not set (DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY). Skipping."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.gate.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: steps.gate.outputs.configured == 'true'
        working-directory: frontend
        env:
          VITE_API_URL: /api/v1
          VITE_BASE_PATH: /
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        if: steps.gate.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy frontend (rsync dist → web root)
        if: steps.gate.outputs.configured == 'true' && env.DEPLOY_WEB_ROOT != ''
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            frontend/dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_WEB_ROOT/"

      - name: Deploy backend (pull + restart on VM)
        if: steps.gate.outputs.configured == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' < deploy/remote-deploy.sh
