# Reverse-proxy the API to the FastAPI backend on 127.0.0.1:8000.
#
# Paste this `location` block INSIDE the existing `server { ... }` block that
# already serves geotiles.tech over HTTPS (the one with `server_name geotiles.tech;`
# and your ssl_certificate lines). Put it ABOVE the SPA fallback `location / {...}`.
#
# The backend serves everything under /api/v1, so a single /api/ proxy is enough.

location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Earth Engine tile/compute calls can be slow on a cold cache.
    proxy_connect_timeout 15s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    proxy_buffering       off;
}
