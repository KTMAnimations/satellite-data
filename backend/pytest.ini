[pytest]
# Pytest configuration for satellite-data backend tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async configuration
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests that don't require external services
    integration: Integration tests that require database/Redis
    e2e: End-to-end tests that require full stack
    slow: Tests that take a long time to run

# Output configuration
addopts =
    -v
    --tb=short
    -ra
    --strict-markers

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Logging
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)

# Timeout for tests (in seconds)
timeout = 60

# Coverage settings (when using pytest-cov)
# Run with: pytest --cov=app --cov-report=html
